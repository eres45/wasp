<!DOCTYPE html>
<html>
<head>
    <title>Test Wasp Code Proxy</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #0052a3;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: #f5f5f5;
            white-space: pre-wrap;
        }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>🧪 Test Wasp Code Proxy</h1>
    <p>Your proxy URL: <strong>https://wasp-code-proxy.waspproxy.workers.dev</strong></p>
    
    <button onclick="testProxy()">Test Proxy Now</button>
    
    <div id="result"></div>

    <script>
        async function testProxy() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '⏳ Testing proxy...';
            
            try {
                const response = await fetch('https://wasp-code-proxy.waspproxy.workers.dev', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'provider-1/gemini-3-flash',
                        messages: [
                            { role: 'user', content: 'Say "Hello from Wasp Code!" if you work' }
                        ],
                        max_tokens: 20,
                        temperature: 0.1
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.choices && data.choices[0]) {
                    resultDiv.innerHTML = `
<span class="success">✅ SUCCESS!</span>

Status: ${response.status}
Model Response: ${data.choices[0].message.content}

Full Response:
${JSON.stringify(data, null, 2)}
                    `;
                } else {
                    resultDiv.innerHTML = `
<span class="error">❌ FAILED</span>

Status: ${response.status}
Error: ${data.error?.message || 'Unknown error'}

Full Response:
${JSON.stringify(data, null, 2)}
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
<span class="error">❌ ERROR</span>

${error.message}

This could mean:
1. Proxy is not deployed yet
2. CORS headers not set correctly
3. Network/firewall issue
                `;
            }
        }
    </script>
</body>
</html>
